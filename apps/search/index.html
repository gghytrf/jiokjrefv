<!DOCTYPE html>
<html lang="ja">
<head>
<script>
/* ===== 統合アプリ用ガード（自動挿入・元コードは未変更）=====
   iframe 内で動くとき、各アプリ独自の Service Worker 登録／キャッシュ操作／
   バージョン確認を無効化し、キャッシュとバージョン管理を親（統合ホーム）へ
   一元化します。localStorage（学習データ・カルテ等）はそのまま使えます。 */
(function(){
  try{
    if (window.top === window.self) return; // 単体起動時は何もしない

    // 1) Service Worker を無害なスタブに
    var swStub = {
      register:function(){ return Promise.reject(new Error('SW disabled in integrated app')); },
      getRegistration:function(){ return Promise.resolve(undefined); },
      getRegistrations:function(){ return Promise.resolve([]); },
      addEventListener:function(){}, removeEventListener:function(){},
      get controller(){ return null; },
      ready:new Promise(function(){})
    };
    try{ Object.defineProperty(navigator,'serviceWorker',{get:function(){return swStub;},configurable:true}); }catch(e){}

    // 2) Cache Storage を無効化（子アプリが親のキャッシュを消さないように）
    var noop0=function(){return Promise.resolve();};
    function neutralizeCaches(){
      try{
        var cacheStub={
          open:function(){return Promise.resolve({addAll:noop0,add:noop0,put:noop0,
            match:function(){return Promise.resolve(undefined);},delete:function(){return Promise.resolve(false);},
            keys:function(){return Promise.resolve([]);}});},
          keys:function(){return Promise.resolve([]);},
          delete:function(){return Promise.resolve(false);},
          match:function(){return Promise.resolve(undefined);},
          has:function(){return Promise.resolve(false);}
        };
        try{ Object.defineProperty(window,'caches',{get:function(){return cacheStub;},configurable:true}); }
        catch(e){
          // defineProperty が不可なら既存オブジェクトのメソッドを直接無害化
          if(window.caches){
            try{ window.caches.keys=function(){return Promise.resolve([]);}; }catch(_){}
            try{ window.caches.delete=function(){return Promise.resolve(false);}; }catch(_){}
            try{ window.caches.open=cacheStub.open; }catch(_){}
          }
        }
      }catch(e){}
    }
    neutralizeCaches();

    // 3) アプリ独自の「更新」ボタンを隠す（親の「更新確認」に一本化）
    var css='#refresh,footer .ver,#ver{display:none !important;}';
    function injectCss(){ try{ var s=document.createElement('style'); s.textContent=css; (document.head||document.documentElement).appendChild(s);}catch(e){} }
    if(document.head){ injectCss(); }
    else { document.addEventListener('DOMContentLoaded', injectCss); }
  }catch(e){}


  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2b2320">
<title>主治症から経穴検索</title>

<style>
:root{
  --bg:#f4efe6; --paper:#fbf8f1; --ink:#2b2320; --ink-soft:#6b5d52;
  --line:#d9cdbb; --accent:#9a4f3a; --accent-soft:#c8896f; --gold:#b08856;
  --tag:#efe4d2; --shadow:0 1px 3px rgba(80,60,40,.12),0 8px 24px rgba(80,60,40,.06);
  --fs:1;          /* 文字サイズ倍率（A-/A+で変化） */
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* rem基準のレイアウトを一括拡縮（ルートのfont-sizeを倍率で変更） */
html{font-size:calc(100% * var(--fs))}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  line-height:1.7;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 20% 0%,rgba(176,136,86,.05),transparent 40%);
  min-height:100vh;
}
header{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,#2b2320,#3a302a);color:#f4efe6;
  padding:14px 18px 12px;box-shadow:0 2px 12px rgba(0,0,0,.18);
}
header .bar{display:flex;align-items:center;gap:10px}
header .bar .txt{flex:1;min-width:0}
/* 文字サイズ調整 */
.fs-ctrl{flex-shrink:0;display:inline-flex;align-items:center;gap:5px}
.fs-ctrl button{width:30px;height:30px;border:1px solid rgba(232,201,140,.45);background:rgba(255,255,255,.10);
  color:#f4efe6;border-radius:8px;cursor:pointer;line-height:1;font-weight:700;font-family:inherit;padding:0;transition:background .2s}
.fs-ctrl button:active{background:var(--gold);color:#2b2320}
.fs-ctrl .fs-minus{font-size:12px}.fs-ctrl .fs-plus{font-size:16px}
.fs-ctrl .fs-label{font-size:.62rem;color:#c9b9a5;min-width:26px;text-align:center;letter-spacing:.05em}
header .ttl{font-size:1.18rem;letter-spacing:.12em;font-weight:600;display:flex;align-items:center;gap:.5em}
.refresh{
  flex-shrink:0;display:inline-flex;align-items:center;gap:6px;
  font-family:inherit;font-size:.78rem;letter-spacing:.05em;
  color:#f4efe6;background:rgba(255,255,255,.10);
  border:1px solid rgba(232,201,140,.45);border-radius:20px;
  padding:7px 13px;cursor:pointer;transition:background .2s;
}
.refresh:active{background:rgba(255,255,255,.2)}
.refresh .ico{display:inline-block;font-size:.95rem;line-height:1}
.refresh.spin .ico{animation:spin .8s linear infinite}
.refresh:disabled{opacity:.6;cursor:default}
@keyframes spin{to{transform:rotate(360deg)}}
header .ttl .seal{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border:1.5px solid var(--gold);border-radius:5px;
  color:var(--gold);font-size:.8rem;letter-spacing:0;
}
header .sub{font-size:.7rem;color:#c9b9a5;letter-spacing:.18em;margin-top:2px}
.wrap{max-width:760px;margin:0 auto;padding:16px 16px 90px}

.search-card{
  background:var(--paper);border:1px solid var(--line);border-radius:14px;
  padding:16px 16px 14px;box-shadow:var(--shadow);
}
.lbl{font-size:.74rem;color:var(--ink-soft);letter-spacing:.1em;margin-bottom:6px}
.inputrow{display:flex;gap:8px}
input[type=text]{
  flex:1;font-family:inherit;font-size:1rem;padding:11px 12px;
  border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);
}
input[type=text]:focus{outline:none;border-color:var(--accent-soft);box-shadow:0 0 0 3px rgba(154,79,58,.1)}
.btn{
  font-family:inherit;font-size:.92rem;padding:11px 16px;border:none;border-radius:9px;
  background:var(--accent);color:#fff;cursor:pointer;letter-spacing:.05em;white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent-soft)}

.terms{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;min-height:4px}
.term{
  display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;
  padding:5px 8px 5px 11px;border-radius:20px;font-size:.84rem;
}
.term b{font-weight:500}
.term span{cursor:pointer;font-size:1.05rem;line-height:1;opacity:.85}

.opts{margin-top:13px;border-top:1px dashed var(--line);padding-top:11px}
.opt-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:.86rem;color:var(--ink-soft)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{
  font-family:inherit;font-size:.82rem;padding:6px 13px;border:none;background:#fff;color:var(--ink-soft);cursor:pointer;
}
.seg button.on{background:var(--accent);color:#fff}
.srcfilter{margin-top:11px}
.srcfilter summary{font-size:.84rem;color:var(--accent);cursor:pointer;letter-spacing:.05em}
.srcgrid{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
.chk{font-size:.82rem;color:var(--ink-soft);display:inline-flex;align-items:center;gap:5px;
  background:var(--tag);padding:5px 10px;border-radius:7px;cursor:pointer;border:1px solid transparent}
.chk.on{background:#fff;border-color:var(--accent-soft);color:var(--ink)}
/* チェック枠を常に同じ幅で確保し、✓の有無で横幅が変わらない＝レイアウトがずれない */
.chk .chkbox{display:inline-block;width:.9em;text-align:center;flex:0 0 auto;color:var(--accent-soft);font-weight:700}
.chk .chklbl{white-space:nowrap}

.suggest{margin-top:14px}
.suggest .lbl{margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-family:inherit;font-size:.8rem;padding:5px 11px;border:1px solid var(--line);
  border-radius:18px;background:#fff;color:var(--ink-soft);cursor:pointer}
.chip:active{background:var(--tag)}

.summary{display:flex;align-items:baseline;justify-content:space-between;margin:22px 2px 12px}
.summary .cnt{font-size:1.05rem;letter-spacing:.05em}
.summary .cnt b{color:var(--accent);font-size:1.4rem;padding:0 3px}
.summary .note{font-size:.74rem;color:var(--ink-soft)}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:13px;
  margin-bottom:13px;box-shadow:var(--shadow);overflow:hidden;
  animation:rise .35s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card .head{padding:13px 15px;cursor:pointer;display:flex;align-items:center;gap:12px}
.card .head:hover{background:rgba(176,136,86,.04)}
.pt-who{font-size:.7rem;color:#fff;background:var(--gold);padding:3px 8px;border-radius:6px;letter-spacing:.05em;font-weight:600;white-space:nowrap}
.pt-name{font-size:1.32rem;font-weight:600;letter-spacing:.06em}
.pt-read{font-size:.82rem;color:var(--ink-soft);margin-left:.15rem}
.pt-mer{font-size:.74rem;color:var(--ink-soft);margin-left:auto;white-space:nowrap}
.pt-badge{font-size:.7rem;color:var(--accent);border:1px solid var(--accent-soft);border-radius:20px;padding:2px 9px;white-space:nowrap}
.card .arrow{color:var(--ink-soft);transition:transform .25s;font-size:.8rem}
.card.open .arrow{transform:rotate(90deg)}
.card .body{display:none;padding:0 15px 15px;border-top:1px solid var(--line)}
.card.open .body{display:block}
.loc{font-size:.86rem;color:var(--ink-soft);margin:11px 0 14px;padding:9px 12px;background:var(--tag);border-radius:8px}
.loc b{color:var(--ink);font-weight:600}
.src{margin-bottom:13px}
.src:last-child{margin-bottom:2px}
.src .sname{font-size:.74rem;color:var(--gold);font-weight:600;letter-spacing:.08em;margin-bottom:3px;border-left:3px solid var(--gold);padding-left:7px}
.src .stext{font-size:.92rem;line-height:1.75}
mark{background:#f6e3b8;color:var(--accent);padding:0 1px;border-radius:2px;font-weight:600}

.empty{text-align:center;color:var(--ink-soft);padding:50px 20px;font-size:.95rem}
.empty .big{font-size:2.4rem;margin-bottom:10px;opacity:.5}

footer{text-align:center;font-size:.7rem;color:var(--ink-soft);padding:24px 16px 40px;letter-spacing:.05em}
footer .ver{opacity:.7}

#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:24px;font-size:.85rem;
  opacity:0;transition:.3s;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25)}
#toast.show{transform:translateX(-50%);opacity:1}

/* ===== モード切替タブ ===== */
.modetab{display:flex;gap:0;margin:0 auto;max-width:760px;padding:14px 16px 0}
.modetab button{
  flex:1;font-family:inherit;font-size:.92rem;letter-spacing:.06em;
  padding:11px 8px;border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);
  cursor:pointer;transition:.2s;
}
.modetab button:first-child{border-radius:10px 0 0 10px}
.modetab button:last-child{border-radius:0 10px 10px 0;border-left:none}
.modetab button.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

/* ===== 逆引きペイン ===== */
.pane[hidden]{display:none}
.mer-filter{margin-top:13px;border-top:1px dashed var(--line);padding-top:11px}
.mer-filter summary{font-size:.84rem;color:var(--accent);cursor:pointer;letter-spacing:.05em}
.mergrid{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.merchip{font-family:inherit;font-size:.8rem;padding:5px 11px;border:1px solid var(--line);
  border-radius:18px;background:#fff;color:var(--ink-soft);cursor:pointer}
.merchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.rev-name{font-size:1.32rem;font-weight:600;letter-spacing:.06em}
.rev-read{font-size:.82rem;color:var(--ink-soft);margin-left:.4rem}
.rev-yomi{font-size:.78rem;color:var(--ink-soft);margin-left:2px}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="txt">
      <div class="ttl"><span class="seal">穴</span><span id="appttl">主治症から経穴検索</span></div>
      <div class="sub" id="appsub">SYMPTOM &nbsp;→&nbsp; ACUPOINT &nbsp;|&nbsp; 各家の主治より</div>
    </div>
    <div class="fs-ctrl">
      <button class="fs-minus" id="fsMinus" title="文字を小さく" aria-label="文字を小さく">A−</button>
      <span class="fs-label" id="fsLabel">標準</span>
      <button class="fs-plus" id="fsPlus" title="文字を大きく" aria-label="文字を大きく">A＋</button>
    </div>
    <button onclick="window.open('./manual.html','_blank')" style="border:1px solid var(--line,#d8cdb6);background:transparent;color:inherit;border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer;white-space:nowrap">📖 使用説明書</button>
  </div>
</header>

<div class="modetab" id="modetab">
  <button data-pane="fwd" class="on">主治症 → 経穴</button>
  <button data-pane="rev">経穴名 → 主治症</button>
</div>

<div class="wrap">
  <!-- ===== 順引き（主治症→経穴）===== -->
  <div class="pane" id="pane-fwd">
  <div class="search-card">
    <div class="lbl">症状・主治症を入力（複数追加可）</div>
    <div class="inputrow">
      <input type="text" id="q" placeholder="例：頭痛、不眠、腰痛 …" autocomplete="off">
      <button class="btn" id="add">追加</button>
    </div>
    <div class="terms" id="terms"></div>

    <div class="opts">
      <div class="opt-row">
        <span>条件：</span>
        <div class="seg" id="mode">
          <button data-m="and" class="on">すべて含む (AND)</button>
          <button data-m="or">いずれか (OR)</button>
        </div>
        <button class="btn ghost" id="clear" style="margin-left:auto">クリア</button>
      </div>
      <details class="srcfilter">
        <summary>出典で絞り込む</summary>
        <div class="srcgrid" id="srcgrid"></div>
      </details>
    </div>

    <div class="suggest">
      <div class="lbl">よく検索される症状</div>
      <div class="chips" id="chips"></div>
    </div>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="cnt">該当 <b id="cnt">0</b> 穴</div>
    <div class="note" id="note"></div>
  </div>

  <div id="results"></div>
  </div><!-- /pane-fwd -->

  <!-- ===== 逆引き（経穴名→主治症）===== -->
  <div class="pane" id="pane-rev" hidden>
    <div class="search-card">
      <div class="lbl">経穴名・読みで検索（漢字／ふりがな・部分一致）</div>
      <div class="inputrow">
        <input type="text" id="rq" placeholder="例：合谷／ごうこく、足三里／あしさんり …" autocomplete="off">
        <button class="btn ghost" id="rclear">クリア</button>
      </div>
      <details class="mer-filter">
        <summary>経絡で絞り込む</summary>
        <div class="mergrid" id="mergrid"></div>
      </details>
    </div>

    <div class="summary" id="rsummary" style="display:none">
      <div class="cnt">該当 <b id="rcnt">0</b> 穴</div>
      <div class="note" id="rnote"></div>
    </div>

    <div id="rresults"></div>
  </div><!-- /pane-rev -->
</div><!-- /wrap -->

<footer>
  鍼灸経穴データベース ／ 各家の主治症より<br>
  <span class="ver" id="ver">データはお使いの端末内に保存されます</span><br>
  <button id="acu-import" style="margin-top:8px;border:1px solid var(--line,#d8cdb6);background:transparent;color:inherit;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer">📥 経穴データを取り込む / 更新する</button>
</footer>

<div id="toast"></div>

<script>
// ── 文字サイズ調整（A-/A+）：ルートfont-sizeを倍率変更し localStorage に保存 ──
(function(){
  const fsSteps=[0.85,1.0,1.15,1.3,1.45];
  const fsNames=['小','標準','大','特大','最大'];
  const FS_KEY='search-fs-idx';
  let fsIdx=1;
  try{ const s=parseInt(localStorage.getItem(FS_KEY),10); if(!isNaN(s)&&s>=0&&s<fsSteps.length) fsIdx=s; }catch(e){}
  function applyFs(){
    document.documentElement.style.setProperty('--fs', fsSteps[fsIdx]);
    const lbl=document.getElementById('fsLabel'); if(lbl) lbl.textContent=fsNames[fsIdx];
    try{ localStorage.setItem(FS_KEY, fsIdx); }catch(e){}
  }
  const minus=document.getElementById('fsMinus'), plus=document.getElementById('fsPlus');
  if(minus) minus.onclick=()=>{ if(fsIdx>0){ fsIdx--; applyFs(); } };
  if(plus)  plus.onclick=()=>{ if(fsIdx<fsSteps.length-1){ fsIdx++; applyFs(); } };
  applyFs();
})();

// 出典は取り込んだデータから自動生成する（13出典など可変）。初期は空。
let SOURCES=[];
// 出典ではない固定列（これら以外を「出典」とみなす）
//  ※「検索キーワード（※検索緩和用　キーワード）」は出典チップの1つとして扱うため、ここには入れない。
const NON_SOURCE_KEYS=new Set([
  "経絡名","WHO表記","経穴名","ふりがな","取穴部位①","取穴部位②","取穴部位",
  // 旧スキーマ互換
  "meridian","who","name","reading","location","loc1","loc2","sources"
]);
// 出典名の表示リネーム（短縮名 → 画面表示名）。
//  CSVカラム「※検索緩和用　キーワード」は、チップ・結果とも「検索キーワード」と表示する。
const SOURCE_RENAME={
  "※検索緩和用　キーワード":"検索キーワード",
  "※検索緩和用 キーワード":"検索キーワード", // 半角スペース版も許容
  "検索キーワード":"検索キーワード"
};
function displaySourceName(shortName){
  return SOURCE_RENAME[shortName] || shortName;
}
const POPULAR=["頭痛","腰痛","不眠","便秘","下痢","めまい","肩こり","咳嗽","喘息","胃痛","坐骨神経痛","耳鳴り","三叉神経痛","婦人病","リウマチ"];
let DATA=[], terms=[], mode="and", srcOn=new Set();

const $=s=>document.querySelector(s);
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);}

// ---- データ正規化 ----
//  CSV由来の日本語キーJSON（経絡名/WHO表記/経穴名/ふりがな/取穴部位①②/各出典名・検索キーワード列）と、
//  旧スキーマ（meridian/who/name/location/sources{…}/keywords）の両方を、共通の内部モデルに変換する。
//  内部モデル: { meridian, who, name, reading, loc1, loc2, sources:{出典名:本文} }
//  ※検索キーワードは sources の1項目（キー「検索キーワード」）として格納する。
function normalizeRecord(r){
  if(!r || typeof r!=="object") return null;
  // 旧スキーマ（sources がオブジェクト）はそのまま活かしつつ欠損を補完
  if(r.sources && typeof r.sources==="object" && !Array.isArray(r.sources)){
    const sources=Object.assign({}, r.sources);
    // 旧スキーマの keywords / 検索キーワード も sources の1項目に取り込む
    const kw=(r.keywords||r["検索キーワード"]||"").trim();
    if(kw && !sources["検索キーワード"]) sources["検索キーワード"]=kw;
    return {
      meridian: r.meridian||r["経絡名"]||"",
      who:      r.who||r["WHO表記"]||"",
      name:     r.name||r["経穴名"]||"",
      reading:  r.reading||r["ふりがな"]||"",
      loc1:     r.loc1||r["取穴部位①"]||r.location||r["取穴部位"]||"",
      loc2:     r.loc2||r["取穴部位②"]||"",
      sources
    };
  }
  // 新スキーマ（各出典がトップレベル列）：固定列以外を出典として集める
  //  「※検索緩和用　キーワード」列も出典の1つ（表示名「検索キーワード」）として取り込む。
  const sources={};
  for(const k of Object.keys(r)){
    if(NON_SOURCE_KEYS.has(k)) continue;
    const v=r[k];
    if(v==null) continue;
    const sv=String(v).trim();
    if(sv) sources[shortSourceName(k)]=sv; // 値が空の出典は載せない
  }
  return {
    meridian: r["経絡名"]||r.meridian||"",
    who:      r["WHO表記"]||r.who||"",
    name:     r["経穴名"]||r.name||"",
    reading:  r["ふりがな"]||r.reading||"",
    loc1:     r["取穴部位①"]||r.location||r["取穴部位"]||"",
    loc2:     r["取穴部位②"]||"",
    sources
  };
}
// 出典の長い列名（例「翁鍼灸治療院（Web)」「代田文誌（沢田健：鍼灸治療基礎学）」）から、
// 表示用の短い名前（括弧の前まで）を作る。フィルター（出典で絞る）はこの短い名前を使う。
function shortSourceName(k){
  const m=String(k).match(/^[^（(]+/);
  return (m?m[0]:String(k)).trim();
}
// 短い名前 → 正式名（カラム名）の対応。検索結果の見出しは正式名で表示する。
let SOURCE_FULL={};
function fullSourceName(shortName){
  return SOURCE_FULL[shortName] || shortName;
}
// 出典の列順（CSVの列順）。取り込み時に生データのキーから確定する。
let SOURCE_ORDER=[];
function computeSourceOrder(rawArr){
  const order=[], seen=new Set();
  SOURCE_FULL={};
  for(const r of rawArr){
    if(!r||typeof r!=="object") continue;
    for(const k of Object.keys(r)){
      if(NON_SOURCE_KEYS.has(k)) continue;
      const name=shortSourceName(k);
      // 正式名（カラム名）を記録。複数行で異なる場合は最初に出たものを優先。
      if(!(name in SOURCE_FULL)) SOURCE_FULL[name]=String(k).trim();
      if(!seen.has(name)){ seen.add(name); order.push(name); }
    }
  }
  SOURCE_ORDER=order;
}
// 取り込んだ全データから出典一覧を作る。並び順は CSV の列順（SOURCE_ORDER）に従う。
function buildSources(){
  // 実際に値が入っている出典だけを、列順で並べる
  const present=new Set();
  for(const p of DATA) for(const s of Object.keys(p.sources||{})) present.add(s);
  const ordered=SOURCE_ORDER.filter(s=>present.has(s));
  // SOURCE_ORDER に無い出典（旧データ等）は後ろに出現順で追加
  for(const s of present){ if(!ordered.includes(s)) ordered.push(s); }
  SOURCES=ordered;
  const keep=new Set([...srcOn].filter(s=>present.has(s)));
  srcOn = keep.size ? keep : new Set(ordered);
}

// ---- localStorage（ブラウザ保管）----
function saveState(){try{localStorage.setItem("acu_state",JSON.stringify({terms,mode,src:[...srcOn]}));}catch(e){}}
function loadState(){try{const s=JSON.parse(localStorage.getItem("acu_state")||"null");if(s){terms=s.terms||[];mode=s.mode||"and";if(s.src&&s.src.length)srcOn=new Set(s.src);}}catch(e){}}

// ---- 経穴データの保存：IndexedDB（他アプリと統一・オフライン可）----
//  検索条件(acu_state)と文字サイズは小さいUI状態なので localStorage のまま。
//  経穴データ本体だけ IndexedDB に保存する。
const ACU_DB = "AcupointSearchDB";
let _acudb = null;
function acuOpenDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(ACU_DB,1);
    req.onupgradeneeded=(e)=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains("acuData")) db.createObjectStore("acuData",{keyPath:"key"});
    };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function acuGet(key){
  return new Promise((resolve)=>{
    try{
      const tx=_acudb.transaction("acuData","readonly");
      const r=tx.objectStore("acuData").get(key);
      r.onsuccess=()=>resolve(r.result||null); r.onerror=()=>resolve(null);
    }catch(e){ resolve(null); }
  });
}
function acuPut(value){
  return new Promise((resolve,reject)=>{
    const tx=_acudb.transaction("acuData","readwrite");
    const r=tx.objectStore("acuData").put(value);
    r.onsuccess=()=>resolve(); r.onerror=()=>reject(r.error);
  });
}

// ---- データ読み込み（端末保存のみ・オフライン可）----
//  取り込み済みデータ（IndexedDB）から読む。通信はしない。
//  旧localStorage保存分があれば一度だけ IndexedDB へ移行する。
async function loadData(){
  try{
    if(!_acudb) _acudb = await acuOpenDB();
    // 端末の保存をできるだけ消えにくくする（対応ブラウザのみ）
    try{ if(navigator.storage && navigator.storage.persist){ await navigator.storage.persist(); } }catch(e){}

    let rec = await acuGet("current");

    // 旧localStorage（acu_data）からの移行（初回のみ）
    if(!rec){
      try{
        const legacy=localStorage.getItem("acu_data");
        if(legacy){
          const arr=JSON.parse(legacy);
          if(Array.isArray(arr)&&arr.length){
            const t=localStorage.getItem("acu_data_time")||new Date().toISOString();
            rec={key:"current",data:arr,importedAt:t};
            await acuPut(rec);
            try{ localStorage.removeItem("acu_data"); localStorage.removeItem("acu_data_time"); }catch(e){}
          }
        }
      }catch(e){}
    }

    if(rec && Array.isArray(rec.data) && rec.data.length>0){
      computeSourceOrder(rec.data);
      DATA=rec.data.map(normalizeRecord).filter(Boolean);
      buildSources();
      showVer(rec.importedAt?new Date(rec.importedAt):null);
      hideImportPrompt();
      return true;
    }
  }catch(e){}
  // 未取り込み
  showImportPrompt();
  return false;
}
function showVer(d){
  const el=$("#ver"); if(!el) return;
  const n=Array.isArray(DATA)?DATA.length:0;
  el.textContent=`経穴データ取り込み済み（${n}件）／端末内に保存`;
}

// ファイル選択で acupoints.json を取り込む
function importAcuFile(ev){
  const file=ev&&ev.target&&ev.target.files&&ev.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const json=JSON.parse(reader.result);
      // acupoints.json は配列。{acupoints:[...]} 形式にも一応対応。
      const arr=Array.isArray(json)?json:(Array.isArray(json.acupoints)?json.acupoints:null);
      if(!arr||arr.length===0){
        alert("経穴データが見つかりませんでした。\nacupoints.json を選択してください。");
        return;
      }
      if(!_acudb) _acudb = await acuOpenDB();
      try{
        await acuPut({key:"current",data:arr,importedAt:new Date().toISOString()});
      }catch(e){ alert("保存に失敗しました: "+e.message); return; }
      computeSourceOrder(arr);
      DATA=arr.map(normalizeRecord).filter(Boolean);
      buildSources();
      showVer(new Date());
      hideImportPrompt();
      renderSrc();
      renderMer();
      run();
      toast(DATA.length+"件の経穴データを取り込みました");
    }catch(e){
      alert("ファイルの読み込みに失敗しました: "+e.message);
    }finally{
      if(ev&&ev.target)ev.target.value="";
    }
  };
  reader.readAsText(file);
}
function triggerAcuImport(){
  let inp=document.getElementById("acu-import-file");
  if(!inp){
    inp=document.createElement("input");
    inp.type="file"; inp.id="acu-import-file"; inp.accept="application/json,.json";
    inp.style.display="none"; inp.onchange=importAcuFile;
    document.body.appendChild(inp);
  }
  inp.click();
}
function showImportPrompt(){
  let ov=document.getElementById("acu-import-prompt");
  if(!ov){
    ov=document.createElement("div");
    ov.id="acu-import-prompt";
    ov.style.cssText="position:fixed;inset:0;z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px;background:#f4efe4;font-family:sans-serif;color:#2c3e50;";
    ov.innerHTML=
      '<div style="font-size:46px;margin-bottom:14px;">📥</div>'+
      '<h2 style="margin-bottom:12px;font-size:20px;">経穴データを取り込んでください</h2>'+
      '<p style="color:#7a8a99;line-height:1.8;max-width:30em;margin-bottom:20px;">'+
      '初回のみ、配布された <b>acupoints.json</b> を取り込みます。<br>'+
      '取り込んだデータは端末内に保存され、次回からはオフラインでも使えます。</p>'+
      '<button id="acu-import-btn" style="border:none;background:#d9820a;color:#fff;font-size:15px;font-weight:700;padding:13px 26px;border-radius:11px;cursor:pointer;">📂 acupoints.json を選ぶ</button>';
    document.body.appendChild(ov);
    ov.querySelector("#acu-import-btn").onclick=triggerAcuImport;
  }
  ov.style.display="flex";
}
function hideImportPrompt(){
  const ov=document.getElementById("acu-import-prompt");
  if(ov)ov.style.display="none";
}

function renderTerms(){
  $("#terms").innerHTML=terms.map((t,i)=>
    `<span class="term"><b>${esc(t)}</b><span data-i="${i}">×</span></span>`).join("");
  $("#terms").querySelectorAll("span[data-i]").forEach(e=>
    e.onclick=()=>{terms.splice(+e.dataset.i,1);renderTerms();run();saveState();});
}
function chipLabel(s){
  // 検索キーワード列はリネーム名（検索キーワード）、それ以外は正式名（カラム名）を表示
  return (SOURCE_RENAME[s]) ? SOURCE_RENAME[s] : fullSourceName(s);
}
function renderSrc(){
  $("#srcgrid").innerHTML=SOURCES.map(s=>
    `<span class="chk ${srcOn.has(s)?"on":""}" data-s="${esc(s)}"><span class="chkbox">${srcOn.has(s)?"✓":""}</span><span class="chklbl">${esc(chipLabel(s))}</span></span>`).join("");
  $("#srcgrid").querySelectorAll(".chk").forEach(e=>e.onclick=()=>{
    const s=e.dataset.s; if(srcOn.has(s)){if(srcOn.size>1)srcOn.delete(s);}else srcOn.add(s);
    renderSrc();run();saveState();
  });
}
function renderChips(){
  $("#chips").innerHTML=POPULAR.map(p=>`<button class="chip">${p}</button>`).join("");
  $("#chips").querySelectorAll(".chip").forEach(e=>e.onclick=()=>addTerm(e.textContent));
}
function addTerm(t){
  t=(t||"").trim(); if(!t)return;
  if(terms.includes(t)){toast("既に追加済みです");return;}
  terms.push(t); $("#q").value=""; renderTerms(); run(); saveState();
}
function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function hl(text,kws){let h=esc(text);kws.forEach(k=>{if(!k)return;const re=new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g");h=h.replace(re,m=>`<mark>${m}</mark>`);});return h;}

function run(){
  const sum=$("#summary"),res=$("#results");
  if(!terms.length){sum.style.display="none";res.innerHTML="";return;}
  const matches=[];
  for(const p of DATA){
    // 検索対象＝選択中の出典のみ（検索キーワードもON時だけ対象）
    const active=Object.entries(p.sources).filter(([s])=>srcOn.has(s));
    if(!active.length)continue;
    const blob=active.map(([,v])=>v).join("　");
    const hit=terms.filter(t=>blob.includes(t));
    const ok = mode==="and" ? hit.length===terms.length : hit.length>0;
    if(ok)matches.push({p,hit:hit.length,active});
  }
  matches.sort((a,b)=>b.hit-a.hit);
  sum.style.display="flex";
  $("#cnt").textContent=matches.length;
  const allSrc = SOURCES.length>0 && srcOn.size===SOURCES.length;
  $("#note").textContent=`${mode==="and"?"すべて含む":"いずれか含む"}／${allSrc?"全出典":srcOn.size+"出典"}`;
  if(!matches.length){res.innerHTML='<div class="empty"><div class="big">該</div>該当する経穴が見つかりませんでした</div>';return;}
  res.innerHTML=matches.map(({p,hit,active})=>{
    const body=active.map(([s,v])=>
      `<div class="src"><div class="sname">${esc(displaySourceName(s))}</div><div class="stext">${hl(v,terms)}</div></div>`).join("");
    const badge=(mode==="or"&&terms.length>1)?`<span class="pt-badge">${hit}/${terms.length}</span>`:"";
    return `<div class="card"><div class="head">
        <span class="pt-who">${esc(p.who)}</span>
        <span class="pt-name">${esc(p.name)}</span>${p.reading?`<span class="pt-read">${esc(p.reading)}</span>`:""}
        ${badge}<span class="pt-mer">${esc(p.meridian)}</span>
        <span class="arrow">▶</span>
      </div>
      <div class="body">${locBlock(p)}${body}</div></div>`;
  }).join("");
  res.querySelectorAll(".card .head").forEach(h=>h.onclick=()=>h.parentElement.classList.toggle("open"));
}

// 取穴部位①②を表示（両方あれば2行、片方ならその1行、旧locationにも対応）
function locBlock(p){
  const a=(p.loc1||"").trim(), b=(p.loc2||"").trim();
  if(a&&b) return `<div class="loc"><b>取穴部位①</b>　${esc(a)}</div><div class="loc"><b>取穴部位②</b>　${esc(b)}</div>`;
  const one=a||b;
  return one?`<div class="loc"><b>取穴部位</b>　${esc(one)}</div>`:"";
}

// mode buttons
$("#mode").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  mode=b.dataset.m;$("#mode").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));run();saveState();
});
$("#add").onclick=()=>addTerm($("#q").value);
$("#q").addEventListener("keydown",e=>{if(e.key==="Enter")addTerm($("#q").value);});
$("#clear").onclick=()=>{terms=[];renderTerms();run();saveState();};

// ================= 逆引き（経穴名 → 主治症）=================
let revMer=null;        // 選択中の経絡（nullなら全経絡）
let revQ="";            // 経穴名検索文字列

function uniqueMeridians(){
  const seen=new Set(),list=[];
  for(const p of DATA){ if(p.meridian && !seen.has(p.meridian)){seen.add(p.meridian);list.push(p.meridian);} }
  return list;
}
function renderMer(){
  const list=uniqueMeridians();
  $("#mergrid").innerHTML=list.map(m=>
    `<button class="merchip ${revMer===m?"on":""}" data-m="${esc(m)}">${esc(m)}</button>`).join("");
  $("#mergrid").querySelectorAll(".merchip").forEach(e=>e.onclick=()=>{
    revMer = (revMer===e.dataset.m) ? null : e.dataset.m;
    renderMer(); runRev();
  });
}
function runRev(){
  const sum=$("#rsummary"),res=$("#rresults");
  const q=revQ.trim();
  if(!q && !revMer){sum.style.display="none";res.innerHTML="";return;}
  // ひらがな↔カタカナを吸収して読み検索できるよう正規化
  const qn=kanaNorm(q);
  const matches=DATA.filter(p=>{
    if(revMer && p.meridian!==revMer) return false;
    if(q){
      const byName=(p.name||"").includes(q);
      const byRead=p.reading && kanaNorm(p.reading).includes(qn);
      if(!byName && !byRead) return false;
    }
    return true;
  });
  // 経穴名の文字数昇順（完全一致を優先的に上へ。読みの完全一致も優先）
  matches.sort((a,b)=>{
    if(q){
      const ea=(a.name===q||kanaNorm(a.reading||"")===qn)?0:1;
      const eb=(b.name===q||kanaNorm(b.reading||"")===qn)?0:1;
      if(ea!==eb) return ea-eb;
    }
    return (a.name||"").length-(b.name||"").length;
  });
  sum.style.display="flex";
  $("#rcnt").textContent=matches.length;
  $("#rnote").textContent = revMer ? revMer : "全経絡";
  if(!matches.length){res.innerHTML='<div class="empty"><div class="big">穴</div>該当する経穴が見つかりませんでした</div>';return;}
  res.innerHTML=matches.map(p=>{
    const body=Object.entries(p.sources||{}).map(([s,v])=>
      `<div class="src"><div class="sname">${esc(displaySourceName(s))}</div><div class="stext">${hl(v,q?[q]:[])}</div></div>`).join("");
    const readHl = p.reading ? `<span class="rev-read">${hl(p.reading,q?[q]:[])}</span>` : "";
    return `<div class="card"><div class="head">
        <span class="rev-name">${hl(p.name||"",q?[q]:[])}</span>${readHl}
        <span class="pt-mer" style="margin-left:auto">${esc(p.meridian||"")}</span>
        <span class="arrow">▶</span>
      </div>
      <div class="body">
        ${locBlock(p)}
        ${body}
      </div></div>`;
  }).join("");
  res.querySelectorAll(".card .head").forEach(h=>h.onclick=()=>h.parentElement.classList.toggle("open"));
}
// ひらがな⇄カタカナを統一（読み検索用）
function kanaNorm(s){
  return String(s||"").replace(/[\u30a1-\u30f6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));
}
let _rtimer;
$("#rq").addEventListener("input",e=>{revQ=e.target.value;clearTimeout(_rtimer);_rtimer=setTimeout(runRev,120);});
$("#rq").addEventListener("keydown",e=>{if(e.key==="Enter"){revQ=e.target.value;runRev();}});
$("#rclear").onclick=()=>{revQ="";revMer=null;$("#rq").value="";renderMer();runRev();};

// ================= タブ切替 =================
const TTL={fwd:["主治症から経穴検索","SYMPTOM &nbsp;→&nbsp; ACUPOINT &nbsp;|&nbsp; 各家の主治より"],
           rev:["経穴名から主治症検索","ACUPOINT &nbsp;→&nbsp; SYMPTOM &nbsp;|&nbsp; 各家の主治より"]};
$("#modetab").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  const pane=b.dataset.pane;
  $("#modetab").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));
  $("#pane-fwd").hidden = pane!=="fwd";
  $("#pane-rev").hidden = pane!=="rev";
  $("#appttl").textContent=TTL[pane][0];
  $("#appsub").innerHTML=TTL[pane][1];
  if(pane==="rev" && !$("#mergrid").children.length) renderMer();
});

// 取り込みボタン（フッターに追加）：ファイル選択でデータを取り込む
const _impBtn=$("#acu-import");
if(_impBtn) _impBtn.onclick=triggerAcuImport;

(async function(){
  loadState();
  renderChips();renderTerms();
  $("#mode").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.m===mode));
  const ok=await loadData();
  // SOURCES はデータ読み込み後に確定するため、ここで出典フィルタを描画
  renderSrc();
  if(ok){ run(); renderMer(); }
})();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
